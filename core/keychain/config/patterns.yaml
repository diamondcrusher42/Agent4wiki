# core/keychain/config/patterns.yaml
# Regex patterns used by core/keychain/scanner.ts to detect credential leaks.
# Applied to all clone output files before merge (defense-in-depth).
#
# Patterns are run against: stdout, files_modified, any .md output files.

patterns:
  anthropic_key:
    regex: 'sk-ant-[A-Za-z0-9\-_]{40,}'
    severity: CRITICAL
    action: BLOCK_AND_ALERT

  openai_key:
    regex: 'sk-[A-Za-z0-9]{48}'
    severity: CRITICAL
    action: BLOCK_AND_ALERT

  telegram_bot_token:
    regex: '\d{8,10}:[A-Za-z0-9_\-]{35}'
    severity: CRITICAL
    action: BLOCK_AND_ALERT

  github_token:
    regex: 'ghp_[A-Za-z0-9]{36}'
    severity: CRITICAL
    action: BLOCK_AND_ALERT

  generic_api_key:
    regex: '(?i)(api[_-]?key|secret|token)\s*[=:]\s*["\']?[A-Za-z0-9\-_]{20,}'
    severity: HIGH
    action: SUGGEST_REVIEW   # Might be a placeholder — flag for human review

  aws_key:
    regex: 'AKIA[0-9A-Z]{16}'
    severity: CRITICAL
    action: BLOCK_AND_ALERT
